</p> </section> <section> <div class="post-grid"> <article class="post-card"> <h2><a href="/posts/welcome-to-starblog">欢迎来到 Starblog</a></h2> <p class="post-meta"> 2026/3/8 · 公告 </p> <p>这是第一篇示例文章，用于验证 Keystatic 到 Astro 的完整发布链路。</p> <div class="chips"> <a class="chip" href="/tags/Astro">#Astro</a><a class="chip" href="/tags/Keystatic">#Keystatic</a><a class="chip" href="/tags/Cloudflare">#Cloudflare</a> </div> </article> </div> </section>  </main> <footer class="site-footer"> <div class="container"> <p>© 2026 Starblog. Built with Astro + Keystatic + Cloudflare.</p> </div> </footer> <script>
      const button = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');

      function syncThemeControl(theme) {
        const isDark = theme === 'dark';
        if (icon) icon.textContent = isDark ? '☀' : '☾';
        if (button) {
          button.setAttribute('aria-pressed', String(isDark));
          button.setAttribute('aria-label', isDark ? '切换到浅色模式' : '切换到深色模式');
        }
      }

      syncThemeControl(document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light');

      button?.addEventListener('click', () => {
        const current = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('theme', next);
        syncThemeControl(next);
      });
    </script> </body> </html>
